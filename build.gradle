plugins {
	id 'java'
	id 'application'
	id("com.gradleup.shadow") version "9.3.0"
	id 'eclipse'
}

group = 'etri'
version = System.getenv("MDT_BUILD_VERSION") ?: "unknown"

application {
	mainClass = 'mdt.cli.MDTCommandsMain'
}

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}
tasks.withType(JavaCompile) {
	options.encoding = 'UTF-8'
}

sourceSets {
	main {
		java {
			srcDirs = [
				'src/main/java',
				'src/main/api',
				'src/main/impl',
				'src/main/antlr'
			]
			
			// .antlr 디렉토리를 명시적으로 제외 (ANTLR 생성 파일)
			exclude '**/.antlr/**'
		}
	}
}

repositories {
	mavenCentral()
	maven {
		url = uri("https://maven.aksw.org/repository/internal/")
		// allowInsecureProtocol = true
	}
}

dependencies {
	implementation project(":utils")
	
	// @Nullable
	compileOnly "com.google.code.findbugs:jsr305:${findbugs_version}"

	// Lombok (from the project :utils)
	compileOnly "org.projectlombok:lombok:${lombok_version}"
	annotationProcessor "org.projectlombok:lombok:${lombok_version}"

	// logback with SLF4j (from the project :utils)
	implementation "ch.qos.logback:logback-classic:${logback_version}"
	
	// Spring Framework web (HTTP Interface, RestClient 등). 버전은 Spring Boot BOM으로 관리.
	implementation platform("org.springframework.boot:spring-boot-dependencies:${spring_boot_version}")
	implementation "org.springframework:spring-web"
	
	// AAS model
	implementation "org.eclipse.digitaltwin.aas4j:aas4j-dataformat-json:${aas4j_version}"
	implementation "org.eclipse.digitaltwin.aas4j:aas4j-dataformat-aasx:${aas4j_version}"
	
	implementation ("commons-beanutils:commons-beanutils:${commons_beanutils_version}") {
		exclude group: 'commons-logging', module: 'commons-logging'
	}
		
	// HTTP Client
	implementation "com.squareup.okhttp3:okhttp:${okhttp_version}"
	
	// jackson 
	implementation "com.fasterxml.jackson.core:jackson-databind:${jackson_version}"
	implementation "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${jackson_version}"
	implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:${jackson_version}"
	
	// Tika
	implementation "org.apache.tika:tika-core:${tika_version}"
		
	// picocli command line parser
	implementation "info.picocli:picocli:${picocli_version}"
	annotationProcessor "info.picocli:picocli-codegen:${picocli_version}"
	implementation "org.jline:jline:${jline_version}"
	
	// MQTT
	implementation "org.eclipse.paho:org.eclipse.paho.client.mqttv3:${paho_version}"
	
	// Antlr
	implementation "org.antlr:antlr4-runtime:${antlr_version}"
	
	// CLI에서 테이블 형태로 text 출력할 때 사용
	implementation "org.nocrala.tools.texttablefmt:text-table-formatter:${text_table_version}"
	// CLI에서 트리 형태로 text 출력할 때 사용
	implementation "org.barfuin.texttree:text-tree:${text_tree_version}"

	// test
	testImplementation "junit:junit:${junit_version}"
	testImplementation "org.mockito:mockito-core:${mockito_version}"
}

tasks.named('test') {
	useJUnit()
	jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
}

jar {
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	// 의존 프로젝트의 logback-test.xml / logback-spring.xml은 jar에 포함하지 않는다.
	// (이 프로젝트의 logback.xml은 그대로 포함된다.)
	exclude 'logback-test.xml'
	exclude 'logback-spring.xml'
}

shadowJar {
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	mergeServiceFiles()

	manifest {
		attributes 'Main-Class': application.mainClass.get()
	}

	exclude 'logback-test.xml'
	exclude 'logback-spring.xml'
	exclude 'META-INF/*.SF'
	exclude 'META-INF/*.DSA'
	exclude 'META-INF/*.RSA'
}

eclipse {
	classpath {
		defaultOutputDir = file('build/classes/java/main')
		file {
			whenMerged { cp ->
				cp.entries.each { entry ->
					if (entry.kind == 'src' && entry.path == 'src/main/java') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'bin/generated-sources/annotations') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'src/main/api') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'src/main/impl') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'src/main/antlr') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'src/main/resources') {
						entry.output = 'build/classes/java/main'
					}
					if (entry.kind == 'src' && entry.path == 'src/test/java') {
						entry.output = 'build/classes/java/test'
					}
				}
			}
		}
	}
}